name: Build AR Ruler APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch ar_flutter_plugin Kotlin version
        run: |
          PLUGIN_BUILD=$(find ~/.pub-cache -path "*/ar_flutter_plugin*/android/build.gradle" | head -1)
          if [ -n "$PLUGIN_BUILD" ]; then
            echo "Found plugin at: $PLUGIN_BUILD"
            sed -i "s/kotlin_version = '1.3.50'/kotlin_version = '1.9.22'/g" "$PLUGIN_BUILD"
            sed -i "s/\"org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version\"/\"org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22\"/g" "$PLUGIN_BUILD"
            sed -i "s/'com.android.tools.build:gradle:[^']*'/'com.android.tools.build:gradle:7.3.0'/g" "$PLUGIN_BUILD"
            echo "=== Patched build.gradle ==="
            cat "$PLUGIN_BUILD"
          else
            echo "ERROR: ar_flutter_plugin build.gradle not found!"
            find ~/.pub-cache -name "build.gradle" | grep ar_flutter
          fi

      - name: Analyze code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ar-ruler-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK_PATH="flutter_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK built successfully! Size: $SIZE"
          fi
