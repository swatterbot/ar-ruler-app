name: Build AR Ruler APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Patch ar_flutter_plugin Kotlin version
        run: |
          echo "=== All ar_flutter build.gradle files ==="
          find ~/.pub-cache -path "*/ar_flutter_plugin*" -name "build.gradle" 2>/dev/null
          # Target the plugin's own build.gradle, NOT the example subfolder
          PLUGIN_BUILD=$(find ~/.pub-cache -path "*/ar_flutter_plugin-*/android/build.gradle" ! -path "*/example/*" | head -1)
          if [ -n "$PLUGIN_BUILD" ]; then
            echo "Patching: $PLUGIN_BUILD"
            # Replace any kotlin version with 1.9.22
            sed -i "s/kotlin_version = '[0-9.]*'/kotlin_version = '1.9.22'/g" "$PLUGIN_BUILD"
            # Replace kotlin-gradle-plugin version reference
            sed -i "s/kotlin-gradle-plugin:\$kotlin_version/kotlin-gradle-plugin:1.9.22/g" "$PLUGIN_BUILD"
            sed -i "s/kotlin-gradle-plugin:[0-9.]*/kotlin-gradle-plugin:1.9.22/g" "$PLUGIN_BUILD"
            echo "=== Patched plugin build.gradle ==="
            cat "$PLUGIN_BUILD"
          else
            echo "Plugin build.gradle not found with exclusion, trying direct path..."
            PLUGIN_BUILD=~/.pub-cache/hosted/pub.dev/ar_flutter_plugin-0.7.3/android/build.gradle
            if [ -f "$PLUGIN_BUILD" ]; then
              echo "Found via direct path: $PLUGIN_BUILD"
              sed -i "s/kotlin_version = '[0-9.]*'/kotlin_version = '1.9.22'/g" "$PLUGIN_BUILD"
              sed -i "s/kotlin-gradle-plugin:[0-9.]*/kotlin-gradle-plugin:1.9.22/g" "$PLUGIN_BUILD"
              cat "$PLUGIN_BUILD"
            else
              echo "ERROR: Could not find plugin build.gradle!"
              ls ~/.pub-cache/hosted/pub.dev/ | grep ar_flutter
            fi
          fi

      - name: Analyze code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ar-ruler-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK_PATH="flutter_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK built successfully! Size: $SIZE"
          fi
