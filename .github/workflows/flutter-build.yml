name: Build AR Ruler APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Inject Gradle init script to force Kotlin 1.7.10
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/force_kotlin.gradle << 'EOF'
          allprojects {
            buildscript {
              configurations.all {
                resolutionStrategy {
                  force "org.jetbrains.kotlin:kotlin-gradle-plugin:1.7.10"
                  force "org.jetbrains.kotlin:kotlin-stdlib:1.7.10"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.10"
                  force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.10"
                }
              }
            }
            configurations.all {
              resolutionStrategy {
                force "org.jetbrains.kotlin:kotlin-gradle-plugin:1.7.10"
                force "org.jetbrains.kotlin:kotlin-stdlib:1.7.10"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.7.10"
                force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.7.10"
              }
            }
          }
          EOF

      - name: Get Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Analyze code
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ar-ruler-release-apk
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Show APK size
        run: |
          APK_PATH="flutter_app/build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "APK built successfully! Size: $SIZE"
          fi
