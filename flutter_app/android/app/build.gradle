// android/app/build.gradle
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

android {
    namespace "com.example.ar_ruler"
    compileSdk 34  // для ARCore лучше 34 (стабильно), можно и 35, но проверим совместимость
    ndkVersion "23.1.7779620"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.ar_ruler"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    
    // ARCore
    implementation 'com.google.ar:core:1.42.0'
    
    // Для работы с ARCore через фрагменты и упрощённый рендеринг используем
    // вспомогательную библиотеку (не Sceneform, а современные утилиты от Google)
    // Но пока оставим только ARCore, рендеринг будем делать через OpenGL или
    // использовать Filament (сложно). Для простоты можно добавить поддержку Sceneform
    // (он deprecated, но работает), либо использовать ARCore с HelloAR примером.
    // Я рекомендую использовать библиотеку arcore-android-sdk с примерами,
    // но для рендеринга простых линий проще использовать OpenGL.
    // Однако, чтобы не усложнять, воспользуемся утилитами из Sceneform (только core),
    // но они всё равно требуют Filament. В современных версиях Sceneform больше не поддерживается.
    // Поэтому будем рисовать через OpenGL, как в официальных примерах ARCore.
    // Для этого добавим зависимости для работы с EGL и графикой.
    
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // Для работы с камерой и SurfaceView
    implementation 'androidx.camera:camera-core:1.3.2'
    implementation 'androidx.camera:camera-lifecycle:1.3.2'
    
    // Если будем использовать фрагменты
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
    
    // Для обработки жестов
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
}
