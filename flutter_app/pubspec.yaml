name: ar_ruler
description: AR Ruler & Virtual Space - AR measurement and 3D visualization app
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  ar_flutter_plugin: ^0.7.3
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  vector_math: ^2.1.4
  uuid: ^4.4.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
